<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>회원가입 폼</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
	<style type="text/css">
		a {
			color: white;
			text-decoration: none;
		}
	</style>
</head>
<body class="container">
	<form>
		<fieldset>
		<legend>회원가입</legend>
		  <div class="row mb-3">
		    <label for="inputName" class="col-sm-2 col-form-label">이름</label>
		    <div class="col-sm-5">
		      <input type="Name" class="form-control" id="Name">
		    </div>
		  </div>
		  <div class="row mb-3">
		    <label for="inputEmail" class="col-sm-2 col-form-label">이메일</label>
		    <div class="col-sm-5">
		      <input type="Email" class="form-control" id="Email">
		    </div>
		  </div>
		  <div class="row mb-3">
		    <label for="inputPhone" class="col-sm-2 col-form-label">전화번호</label>
		    <div class="col-sm-5">
		      <input type="Phone" class="form-control" id="Phone">
		    </div>
		  </div>
		  <div class="row mb-3">
		    <label for="inputID" class="col-sm-2 col-form-label">아이디</label> 
		    <div class="col-sm-5">
		      <input type="ID" class="form-control" id="ID"> 
			  <div class="col-sm-8">
				<button type="submit" class="btn btn-primary">중복 확인</button>
			  </div>
		    </div>
		  </div>
		
		  <div class="row mb-3">
		    <label for="inputPassword3" class="col-sm-2 col-form-label">비밀번호</label>
		    <div class="col-sm-5">
		      <input type="password" class="form-control" id="inputPassword3">
		    </div>
		  </div>
		  <div class="row mb-3">
		    <label for="inputPassword3" class="col-sm-2 col-form-label">비밀번호 확인</label>
		    <div class="col-sm-5">
		      <input type="password" class="form-control" id="inputPassword3">
		    </div>
		  </div>
		  <div class="col-sm-8 offset-sm-2">
			<button type="submit" class="btn btn-primary">확인</button>
	 	  </div>
					

  		</fieldset>
	</form>
</body>
</html>
